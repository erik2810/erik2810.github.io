# Project showcase data, rendered by layouts/_default/projects.html
# Add a project here and it appears on /projects/ automatically.
#
# Fields: id, section, title, problem, solution, highlights[], tech[],
#         source (GitHub URL), demo (live URL), featured, core, hidden
#   - problem:  "The Engineering Problem" (industry framing)
#   - solution: "The ML / Mathematical Solution" (methodology framing)
#   - tech:     "Tech Stack"
#   - description: legacy single paragraph; used only as a fallback when
#                  problem/solution are absent (e.g. hidden entries)

sections:
  - id: graph-ml
    name: Graph Machine Learning & Generative Modeling
  - id: simulation
    name: Differentiable Simulation & Physics
  - id: scientific-computing
    name: Scientific Computing & Numerical ML
  - id: applications
    name: Applied Machine Learning

projects:
  - id: graph-ml-lab
    section: graph-ml
    title: "Graph ML Lab: 3D Spatial Graph Generation"
    featured: true
    core: true
    problem: >-
      Generating realistic 3D branching morphologies, like trees or neuron-like arbors, is hard
      because proximity does not imply connectivity: the discrete graph topology and the continuous 3D
      geometry have to be modelled together, which off-the-shelf generative models do not handle.
    solution: >-
      A graph generative-modelling framework written from scratch in pure PyTorch (no PyG or DGL),
      built around energy-based and probabilistic models: a conditional graph VAE, autoregressive
      spatial-tree generation, and a joint discrete-continuous diffusion that denoises graph structure
      and 3D node positions at the same time.
    highlights:
      - Joint discrete-continuous diffusion over topology and 3D coordinates
      - Autoregressive spatial-tree VAE with joint topology-geometry sampling
      - Custom GCN/GAT message-passing layers built from raw tensor operations
      - "Evaluation pipeline: morphological metrics, Sholl analysis, spatial MMD"
    tech: [PyTorch, Graph Neural Networks, Diffusion Models, VAEs, FastAPI]
    source: https://github.com/erik2810/ml-projects
    demo: https://erik2810.github.io/ml-projects/

  - id: mesh-physics
    section: simulation
    title: Mesh-Based Differentiable Physics Simulator
    featured: true
    core: true
    problem: >-
      Tuning a physics simulation to hit a target behaviour normally needs gradient-free search,
      because conventional simulators are not differentiable. That is slow, sample-inefficient and
      hard to fit into an optimisation loop.
    solution: >-
      A fully differentiable pipeline in PyTorch: mesh topology initialises a particle-spring system,
      forces follow energy-based formulations, and end-to-end backpropagation through the continuous
      dynamics lets you optimise physical parameters with custom PyTorch loss functions.
    highlights:
      - "Differentiable physical pipeline: gradients flow through the full simulation"
      - Custom PyTorch loss functions for gradient-based simulation control
      - Energy-based force formulation derived from mesh topology
      - Vectorised, GPU-accelerated tensor operations (CUDA / MPS)
    tech: [PyTorch, Autograd, Differentiable Simulation, "CUDA/MPS", NumPy]

  - id: knitted-models
    section: simulation
    title: Knitted Models
    problem: >-
      Procedurally generating manufacturable woven, knit and chain-mail strand patterns on arbitrary
      3D surfaces requires robust traversal of mesh connectivity and smooth, exportable curve
      geometry.
    solution: >-
      A geometry-processing pipeline that ingests quad meshes, builds a half-edge data structure for
      O(1) topological traversal, traces continuous strand paths, and fits Catmull-Rom or Hermite
      splines. The result renders with GPU path tracing or exports to OBJ for downstream tooling.
    highlights:
      - Half-edge data structure for O(1) topological traversal
      - Catmull-Rom and Hermite spline interpolation for smooth strand geometry
      - Weave, knit-loop and chain-mail pattern generation from quad topology
      - GPU path tracing for rendering; OBJ export
    tech: [TypeScript, Three.js, Vite, WebGL, Computational Geometry]

  - id: traer-physics
    section: simulation
    title: Traer Physics Simulations
    problem: >-
      Interactive real-time particle and cloth simulation in the browser needs high-throughput
      compute and an architecture that can optionally offload to a heavier GPU backend without
      rewriting the renderer.
    solution: >-
      A real-time particle-system engine with structural, shear and bending spring constraints that
      runs standalone on flat Float32Array buffers, or streams from a PyTorch backend over a binary
      WebSocket protocol (10 to 20 times faster than JSON) at 60 Hz behind an unchanged renderer.
    highlights:
      - Float32Array buffers for high-performance browser-side compute
      - Structural, shear and bending constraints for cloth simulation
      - Binary WebSocket protocol with an optional PyTorch backend at 60 Hz
      - Decoupled compute / render architecture
    tech: [TypeScript, Three.js, PyTorch, WebSocket, Vite]
    source: https://github.com/erik2810/traerphysics-js
    demo: https://erik2810.github.io/traerphysics-js/

  - id: ricci-flow
    section: simulation
    title: Ricci Flow on Surfaces of Revolution
    problem: >-
      Evolving a geometry under a curvature-driven PDE is numerically stiff and prone to blow-up,
      and making the process explorable means streaming solver state to a 3D frontend in real time.
    solution: >-
      A finite-difference PDE solver with Fourier filtering and reparametrisation for stability that
      evolves surface metrics toward constant curvature, computes curvature fields as geometric data,
      and streams them to a Three.js frontend over WebSocket.
    highlights:
      - Finite-difference PDE solver with Fourier filtering and reparametrisation for stability
      - Curvature-field computation as geometric data
      - Python to Three.js streaming over WebSocket
      - Real-time 3D rendering with curvature-based colouring
    tech: [Python, NumPy, SciPy, Three.js, WebSocket]

  - id: diffqft
    section: scientific-computing
    title: "DiffQFT: Differentiable Computation on Curved Geometries"
    featured: true
    core: true
    problem: >-
      Computations on curved, non-Euclidean geometries hinge on expensive high-dimensional integrals,
      and inferring the parameters of such a system means differentiating through that whole numerical
      pipeline, which black-box solvers cannot do.
    solution: >-
      A fully differentiable computation framework (PyTorch autograd) for multi-dimensional tensor
      operations and Monte-Carlo integration over a curved 2D (hyperbolic) domain. It trains neural
      surrogate models that replace expensive Monte-Carlo evaluations, a physics-informed neural
      network for a non-linear PDE, and a gradient-based inverse-optimisation workflow that recovers
      latent parameters from boundary observations.
    highlights:
      - "Custom autograd functions for integration on non-Euclidean domains, for geometric data processing and topological reasoning"
      - Neural surrogate models replacing Monte-Carlo evaluation for order-of-magnitude speedups
      - Physics-informed neural network (PINN) for a non-linear (Klein-Gordon) PDE
      - "Gradient-based inverse problem: recovering latent parameters from boundary data"
      - Energy-based, non-linear (Sine-Gordon) model under a differentiable optimisation framework
    tech: [PyTorch, Autograd, PINNs, Monte Carlo, NumPy, FastAPI]
    source: https://github.com/erik2810/DiffQFT
    demo: https://erik2810.github.io/DiffQFT/

  - id: neural-ode-lorenz
    section: scientific-computing
    title: "Neural ODE: Learning Chaotic Dynamics"
    problem: >-
      Can a neural network learn the equations of a chaotic dynamical system straight from trajectory
      data, built entirely from scratch with no ML libraries, so that every part of the autodiff and
      optimisation loop is visible?
    solution: >-
      A from-scratch neural network (matrix ops, He initialisation, forward/backward pass, Adam)
      learns the Lorenz vector field against an RK4 ground-truth integrator and trains live in the
      browser. A companion PyTorch prototype backpropagates through the RK4 solver as a differentiable
      simulation.
    highlights:
      - "From-scratch neural network: matrices, He init, backprop, Adam, no ML libraries"
      - RK4 numerical integrator for ground-truth chaotic trajectories
      - Real-time, in-browser training loop
      - "PyTorch prototype: gradient-based simulation through the RK4 solver"
    tech: [PyTorch, JavaScript, Three.js, NumPy]
    source: https://github.com/erik2810/differentiable-physics-engine
    demo: https://erik2810.github.io/differentiable-physics-engine/

  - id: pinn-solver
    section: scientific-computing
    title: PINN Solver
    problem: >-
      Classical PDE solvers need bespoke meshing and a separate implementation per equation, and
      shipping them for interactive use is heavyweight.
    solution: >-
      Physics-Informed Neural Networks solve 10 PDEs with a custom physics loss (PDE residual plus
      boundary and initial conditions). The approach is mesh-free and gradient-based. Pre-trained
      models run inference client-side in JavaScript, and a training CLI handles new equations and
      hyperparameter sweeps.
    highlights:
      - "Custom physics-informed loss: PDE residual + boundary/initial conditions"
      - Mesh-free, gradient-based PDE solving across 10 equations
      - Client-side JavaScript inference, no backend required
      - Training CLI for custom equations and hyperparameter sweeps
    tech: [PyTorch, PINNs, JavaScript, FastAPI]
    source: https://github.com/erik2810/pde-solver
    demo: https://erik2810.github.io/pde-solver/

  - id: integration-visualizer
    section: scientific-computing
    title: Integration Visualizer
    problem: >-
      Computing and explaining integrals across symbolic, numerical and stochastic methods, and
      verifying vector-calculus theorems, usually means stitching together disconnected tools with no
      shared 3D view.
    solution: >-
      A unified engine that computes single-through-flux integrals via symbolic (SymPy), numerical
      (SciPy) and Monte-Carlo (PyTorch) pipelines, verifies the Green, Stokes and Divergence theorems,
      and renders surfaces, vector fields and integration regions interactively in 3D.
    highlights:
      - Symbolic, numerical and Monte-Carlo computation pipelines
      - Interactive 3D visualisation of surfaces, vector fields and regions
      - "Theorem verification: Green, Stokes, Divergence"
    tech: [React, Three.js, PyTorch, SymPy, SciPy, FastAPI]
    source: https://github.com/erik2810/integration-visualizer
    demo: https://erik2810.github.io/integration-visualizer/

