<nav class="site-nav">
    <div class="nav-container">
        <a href="/" class="nav-logo">Erik Löffelholz</a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox" aria-label="Toggle navigation">
        <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <div class="nav-links">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}"
               {{ if .Params.external }}target="_blank" rel="noopener"{{ end }}
               {{ if and (not .Params.external) ($.IsMenuCurrent "main" .) }}class="active"{{ end }}>
                {{- .Name -}}
                {{- if .Params.external }}<span class="external-icon">&nearr;</span>{{ end -}}
            </a>
            {{ end }}
        </div>
    </div>
</nav>
