{{ define "main" }}
<article class="page-content">
    <div class="container">
        {{ if not .Params.hide_title }}
        <header class="page-header">
            <h1>{{ .Title }}</h1>
            {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
        </header>
        {{ end }}
        <div class="content">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
