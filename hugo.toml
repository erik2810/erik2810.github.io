baseURL = 'https://erik2810.github.io/'
languageCode = 'en-us'
title = 'Erik Löffelholz'
theme = 'PaperMod'

author = 'Erik Löffelholz'

[params]
  author = 'Erik Löffelholz'
  description = 'Mathematical Physics · Differentiable Simulation · Geometric Graph Machine Learning'
  defaultTheme = 'light'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = false
  math = true

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[markup]
  [markup.highlight]
    style = 'native'
    noClasses = true
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]

